# This file was auto-generated for GitHub Actions CI/CD to deploy to Firebase Hosting
# Reference: https://github.com/FirebaseExtended/action-hosting-deploy

name: Deploy to Firebase Hosting on Merge
on:
  push:
    branches:
      - main
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build SPA
        run: npm run build

      - name: Deploy to Firebase Hosting (Live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LIFEOSCA }}
          channelId: live
          projectId: lifeosca
